on:
  schedule:
    - cron: "0 21 * * 5" # Every Friday at 21:00 UTC
  workflow_dispatch:

name: Update Vulkan-Headers

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update Vulkan-Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Update submodule to latest tag
        id: update
        run: |
          cd crates/generator/external/Vulkan-Headers
          git fetch --tags
          LATEST=$(git tag --sort=-v:refname | grep '^v[0-9]' | head -1)
          git checkout "$LATEST"
          cd "$GITHUB_WORKSPACE"
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "version=${LATEST#v}" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run generator
        if: steps.diff.outputs.changed == 'true'
        run: cargo run -p generator

      - name: Format generated code
        if: steps.diff.outputs.changed == 'true'
        run: cargo fmt --all

      - name: Bump version
        if: steps.diff.outputs.changed == 'true'
        id: version
        run: |
          HEADER="${{ steps.update.outputs.version }}"  # e.g. 1.4.347
          # Read current version, strip any existing +metadata
          CURRENT=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          BASE="${CURRENT%%+*}"
          # Increment patch: 0.1.3 -> 0.1.4
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEW="${MAJOR}.${MINOR}.${PATCH}+${HEADER}"
          sed -i "s/^version = \".*\"/version = \"${NEW}\"/" Cargo.toml
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "header=$HEADER" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.UPDATE_PAT }}
          branch: update
          commit-message: "Update Vulkan-Headers to ${{ steps.update.outputs.tag }}"
          title: "Update Vulkan-Headers to ${{ steps.update.outputs.tag }}"
          body: |
            Automated update of the Vulkan-Headers submodule to `${{ steps.update.outputs.tag }}` and regenerated bindings.

            Release version: `${{ steps.version.outputs.new }}`
