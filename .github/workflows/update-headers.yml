on:
  schedule:
    - cron: "0 6 * * 6" # Every Saturday at 06:00 UTC
  workflow_dispatch:

name: Update Vulkan-Headers

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update Vulkan-Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Update submodule to latest tag
        id: update
        run: |
          cd crates/generator/external/Vulkan-Headers
          git fetch --tags
          LATEST=$(git tag --sort=-v:refname | grep '^v[0-9]' | head -1)
          git checkout "$LATEST"
          cd "$GITHUB_WORKSPACE"
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run generator
        if: steps.diff.outputs.changed == 'true'
        run: cargo run -p generator

      - name: Format generated code
        if: steps.diff.outputs.changed == 'true'
        run: cargo fmt --all

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.UPDATE_PAT }}
          branch: update
          commit-message: "Update Vulkan-Headers to ${{ steps.update.outputs.version }}"
          title: "Update Vulkan-Headers to ${{ steps.update.outputs.version }}"
          body: |
            Automated update of the Vulkan-Headers submodule to `${{ steps.update.outputs.version }}` and regenerated bindings.
